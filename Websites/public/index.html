<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The T-Rex Game</title>
  <meta property="og:title" content="The T-Rex Game">
  <meta name="application-name" content="The T-Rex Game">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app">
    <!-- 1. Start Screen -->
    <div id="start-screen" class="screen">
      <h1>The T-Rex Game</h1>
      <p style="margin: 1rem 0; color: #888;">Guess which path the T-Rex will take?</p>
      <button class="btn btn-primary" onclick="showNameScreen()">Play</button>
      <div class="nav-links">
        <a href="leaderboard.html">📊 Leaderboard</a>
      </div>
    </div>

    <!-- 2. Name Screen -->
    <div id="name-screen" class="screen" style="display:none;">
      <h2>Enter your name</h2>
      <input type="text" id="player-name" placeholder="e.g. Player 1" maxlength="20" autocomplete="off">
      <br>
      <button class="btn btn-primary" onclick="goToBet()">Next</button>
      <button class="btn btn-secondary" onclick="showStartScreen()">Back</button>
    </div>

    <!-- 3. Bet Screen -->
    <div id="bet-screen" class="screen" style="display:none;">
      <h2>Choose path (1-4)</h2>
      <p style="color: #888; margin-bottom: 0.5rem;">Which path will the T-Rex appear from?</p>
      <div class="choices">
        <div class="choice choice-1" data-choice="1" onclick="selectChoice(1)">Path 1</div>
        <div class="choice choice-2" data-choice="2" onclick="selectChoice(2)">Path 2</div>
        <div class="choice choice-3" data-choice="3" onclick="selectChoice(3)">Path 3</div>
        <div class="choice choice-4" data-choice="4" onclick="selectChoice(4)">Path 4</div>
      </div>
      <button class="btn btn-primary" id="confirm-btn" onclick="submitBet()" disabled>Confirm</button>
      <button class="btn btn-secondary" onclick="showNameScreen()">Back</button>
    </div>

    <!-- 4. Waiting Screen -->
    <div id="waiting-screen" class="screen" style="display:none;">
      <h2>Submitted!</h2>
      <p>Waiting for result from console...</p>
      <p id="waiting-count" style="color: #4cc9f0; margin-top: 1rem;">0 players joined</p>
    </div>

    <!-- 5. Result Screen -->
    <div id="result-screen" class="screen" style="display:none;">
      <h2 id="result-title">Result</h2>
      <div id="result-content" class="card"></div>
      <button class="btn btn-primary" onclick="resetAndStart()">Play Again</button>
      <div class="nav-links">
        <a href="leaderboard.html">📊 Leaderboard</a>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
