<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - The T-Rex Game</title>
  <meta property="og:title" content="Leaderboard - The T-Rex Game">
  <meta name="application-name" content="The T-Rex Game">
  <link rel="stylesheet" href="game-style.css">
</head>
<body>
  <main class="page-wrap">
    <h1>Leaderboard</h1>
    <p class="subtitle">Top scores</p>

    <div id="leaderboard-list" class="card">
      <p id="loading">Loading...</p>
      <ul id="rank-list" style="list-style: none;"></ul>
    </div>

    <div class="nav-links">
      <a href="index.html">← Back to Game</a>
      <a href="console.html">Console</a>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    function loadLeaderboard() {
      var list = document.getElementById('rank-list');
      var loading = document.getElementById('loading');
      if (!db) { loading.textContent = 'Firebase not connected'; return; }
      db.collection('scores').orderBy('score', 'desc').limit(50).get().then(function(snap) {
        loading.style.display = 'none';
        list.innerHTML = '';
        if (snap.empty) {
          list.innerHTML = '<li style="color:#888; padding: 0.5rem 0;">No scores yet. Play and submit your score!</li>';
          return;
        }
        snap.forEach(function(doc, i) {
          var d = doc.data();
          var li = document.createElement('li');
          li.style.cssText = 'padding: 0.5rem 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;';
          li.innerHTML = '<span>#' + (i + 1) + ' ' + (d.playerName || 'Anonymous') + '</span><span style="color:#4cc9f0; font-weight: 600;">' + (d.score || 0) + '</span>';
          list.appendChild(li);
        });
      }).catch(function(e) {
        loading.textContent = 'Load failed: ' + (e.message || e);
      });
    }
    if (typeof db !== 'undefined' && db) loadLeaderboard();
    else document.addEventListener('DOMContentLoaded', loadLeaderboard);
  </script>
</body>
</html>
