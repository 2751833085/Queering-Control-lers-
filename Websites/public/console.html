<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Console - The T-Rex Game</title>
  <meta property="og:title" content="Console - The T-Rex Game">
  <meta name="application-name" content="The T-Rex Game">
  <link rel="stylesheet" href="game-style.css">
</head>
<body>
  <main class="page-wrap">
    <h1>Console</h1>
    <p class="subtitle">Admin: Jump, restart game, reset leaderboard</p>

    <div class="card">
      <div style="margin-bottom: 0.5rem; font-weight: 600;">Dino Control</div>
      <button class="btn btn-primary" onclick="triggerDinoJump()">Make Dino Jump</button>
      <p style="font-size: 12px; color: #888; margin-top: 0.5rem;">Remotely trigger jump on the game screen</p>
    </div>

    <div class="card">
      <div style="margin-bottom: 0.5rem; font-weight: 600;">Game Control</div>
      <button class="btn btn-secondary" onclick="restartGame()" style="margin-right: 0.5rem;">Restart Game</button>
      <p style="font-size: 12px; color: #888; margin-top: 0.5rem;">Remote restart on the game screen</p>
    </div>

    <div class="card">
      <div style="margin-bottom: 0.5rem; font-weight: 600;">Leaderboard</div>
      <button class="btn btn-danger" onclick="resetLeaderboard()">Reset Leaderboard</button>
      <p style="font-size: 12px; color: #888; margin-top: 0.5rem;">Clear all scores (cannot be undone)</p>
    </div>

    <div class="nav-links">
      <a href="index.html">← Back to Game</a>
      <a href="leaderboard.html">Leaderboard</a>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    var dinoControlRef;
    if (typeof db !== 'undefined') {
      dinoControlRef = db.collection('dinoGame').doc('control');
    }

    function triggerDinoJump() {
      if (!dinoControlRef) { alert('Firebase not connected'); return; }
      dinoControlRef.set({ action: 'jump', timestamp: firebase.firestore.FieldValue.serverTimestamp() })
        .then(function() {})
        .catch(function() { alert('Failed to trigger jump'); });
    }

    function restartGame() {
      if (!dinoControlRef) { alert('Firebase not connected'); return; }
      dinoControlRef.set({ action: 'restart', timestamp: firebase.firestore.FieldValue.serverTimestamp() })
        .then(function() {})
        .catch(function() { alert('Failed to restart'); });
    }

    function resetLeaderboard() {
      if (!db) { alert('Firebase not connected'); return; }
      if (!confirm('Reset leaderboard? This will delete all scores (cannot be undone).')) return;
      db.collection('scores').get().then(function(snap) {
        var batch = db.batch();
        snap.forEach(function(doc) { batch.delete(doc.ref); });
        return batch.commit();
      }).then(function() {
        alert('Leaderboard reset complete');
      }).catch(function(e) {
        alert('Reset failed: ' + (e.message || e));
      });
    }
  </script>
</body>
</html>
